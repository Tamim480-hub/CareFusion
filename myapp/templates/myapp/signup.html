
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - CareFusion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

.logo-image {
    text-align: center;
    margin-bottom: 15px;
}

.logo-image img {
    width: 140px;
    height: auto;
}
      body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #f5f5f5;   /* off white color */
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
}

        .logo-container {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            width: 80px;
            height: 80px;
            background: #1e88e5;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            box-shadow: 0 4px 15px rgba(30, 136, 229, 0.3);
        }

        .logo-icon i {
            font-size: 40px;
            color: white;
        }

        .brand-name {
            font-size: 32px;
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .tagline {
            color: #7f8c8d;
            font-size: 15px;
        }

        .signup-card {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
            padding: 40px;
            width: 100%;
            max-width: 650px;
        }

        .form-title {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .form-title i {
            color: #1e88e5;
        }

        .form-subtitle {
            color: #7f8c8d;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .form-label {
            font-weight: 600;
            color: #2c3e50;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
        }

        .required {
            color: #e74c3c;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group-text {
            background: #f5f7fa;
            border: 2px solid #e8ecf1;
            border-right: none;
            border-radius: 10px 0 0 10px;
            padding: 12px 15px;
        }

        .input-group-text i {
            color: #7f8c8d;
        }

        .form-control, .form-select {
            border: 2px solid #e8ecf1;
            border-left: none;
            border-radius: 0 10px 10px 0;
            padding: 12px 15px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-control:focus, .form-select:focus {
            border-color: #1e88e5;
            box-shadow: none;
        }

        .row {
            margin: 0 -10px;
        }

        .col {
            padding: 0 10px;
        }

        .form-check {
            margin-bottom: 20px;
        }

        .form-check-input {
            width: 16px;
            height: 16px;
            margin-right: 8px;
            cursor: pointer;
        }

        .form-check-label {
            color: #7f8c8d;
            font-size: 14px;
            cursor: pointer;
        }

        .form-check-label a {
            color: #1e88e5;
            text-decoration: none;
            font-weight: 600;
        }

        .btn-signup {
            background: #1e88e5;
            color: white;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-signup:hover {
            background: #1565c0;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(30, 136, 229, 0.3);
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #7f8c8d;
            font-size: 14px;
        }

        .login-link a {
            color: #1e88e5;
            text-decoration: none;
            font-weight: 600;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            .signup-card {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
      <div class="logo-image">
        <img src="{% static 'images/carefusion.png' %}" alt="CareFusion Logo">
      </div>
        <h1 class="brand-name">CareFusion</h1>
        <p class="tagline">Management System - Create your account to get started</p>
    </div>

    <div class="signup-card">
        <h2 class="form-title">
            <i class="fas fa-user-plus"></i>
            Create Account
        </h2>
        <p class="form-subtitle">Fill in your information to register</p>
<form method="POST">
    {% csrf_token %}

    <div class="row">
        <div class="col-md-6 mb-3">
            <label class="form-label">First Name *</label>
            <input type="text" name="first_name" class="form-control" required>
        </div>
        <div class="col-md-6 mb-3">
            <label class="form-label">Last Name *</label>
            <input type="text" name="last_name" class="form-control" required>
        </div>
    </div>

    <div class="mb-3">
        <label class="form-label">Email *</label>
        <input type="email" name="email" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Phone</label>
        <input type="tel" name="phone" class="form-control">
    </div>

    <div class="mb-3">
        <label class="form-label">Password *</label>
        <input type="password" name="password" class="form-control" required>
    </div>

    <div class="mb-3">
        <label class="form-label">Confirm Password *</label>
        <input type="password" name="confirm_password" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-primary w-100">Sign Up</button>
</form>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
